<!DOCTYPE html>  
<html lang="zh">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>美化标题</title>  
    <style>  
        h1 {  
            color: #ff6347; /* 粉色字体 */  
            font-family: Arial, sans-serif; /* Arial 字体 */  
            font-size: 3em; /* 字体大小 */  
            text-align: center; /* 文本居中 */  
            margin-top: 20px; /* 上边距 */  
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* 文本阴影 */  
        }  
  
        body {  
            background-color: #f0f0f0; /* 浅灰色背景 */  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            height: 100vh;  
            margin: 0;  
        }  
    </style>  
</head>  
<body>  
    <h1>你好，世界！</h1>  
</body>  
</html>
